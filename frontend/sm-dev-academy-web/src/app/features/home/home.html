@if (!isHomeLoading) {
  <app-page-container>
    <app-home-hero />

    @if (continueCourse) {
      <section class="continue-watching">
        <h2 class="continue-watching__title">
          Continue Assistindo
        </h2>

        <app-continue-watching-card
          [course]="continueCourse"
        />
      </section>
    }
    
    <app-stream-section
      title="Cursos em Destaque"
      subtitle="Cursos recomendados para você continuar evoluindo"
    >
      @for (course of courses; track course.id) {
        <app-highlight-course-card
          [title]="course.title"
          [category]="course.category"
          [description]="course.description"
          [image]="course.thumbnail"
          [playlistId]="course.playlistId"
        />
      }
    </app-stream-section>
    <section class="home-categories">
      <div class="home-categories__grid">
        <app-category-card
          title="Frontend"
          icon="code"
          route="/learn/courses/frontend"
        />

        <app-category-card
          title="Backend"
          icon="dns"
          route="/learn/courses/backend"
        />

        <app-category-card
          title="Mobile"
          icon="smartphone"
          route="/learn/courses/mobile"
        />

        <app-category-card
          title="Banco de Dados"
          icon="storage"
          route="/learn/courses/data-base"
        />

        <app-category-card
          title="DevOps"
          icon="all_inclusive"
          route="/learn/courses/devops"
        />

        <app-category-card
          title="Inteligência Artificial"
          icon="neurology"
          route="/learn/courses/artificial-intelligence"
        />
      </div>
    </section>  
  </app-page-container>
}
