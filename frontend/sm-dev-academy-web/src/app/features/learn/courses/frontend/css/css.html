<app-page-container>

  <div class="courses__hero">

    <h1 class="courses__title">
      CSS
    </h1>

    <p class="courses__subtitle">
      Explore nossos cursos de CSS e aprenda layouts modernos com Flexbox e Grid, animações, responsividade, efeitos visuais e boas práticas para criação de interfaces profissionais.
    </p>

  </div>

  <app-responsive-grid>

    @for (
      course of visibleCourses;
      track course.playlistId
    ) {

      <article
        class="course-card"
        (click)="openCourse(course.playlistId)"
      >

        <img
          class="course-card__image"
          loading="lazy"
          [src]="course.thumbnail"
          [alt]="course.title"
        >

        <div class="course-card__content">

          <h3 class="course-card__title">
            {{ course.title }}
          </h3>

        </div>

      </article>

    }

    <div
      #sentinel
      class="courses__sentinel"
    ></div>

  </app-responsive-grid>

</app-page-container>
