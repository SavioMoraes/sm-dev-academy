<app-page-container>
  <p style="color:white">
  Cursos: {{ visibleCourses.length }}
</p>

<p style="color:red">
  Total API: {{ courses.length }}
</p>
  <app-responsive-grid>
    @for (
      course of visibleCourses;
      track course.playlistId
    ) {
      <article
        class="course-card"
        (click)="openCourse(course.playlistId)"
      >
        <img
          class="course-card__image"
          [src]="course.thumbnail"
          [alt]="course.title"
        >

        <div class="course-card__content">
          <h3 class="course-card__title">
            {{ course.title }}
          </h3>
        </div>
      </article>
    }

    <div
      #sentinel
      class="courses__sentinel"
    ></div>
  </app-responsive-grid>
</app-page-container>
