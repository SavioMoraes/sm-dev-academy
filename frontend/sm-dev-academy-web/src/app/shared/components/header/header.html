<header class="header">
  <div class="header__left">
    <!-- MOBILE/TABLET HAMBURGUER -->
    <button
      type="button"
      class="header__menu-toggle"
    >
      Menu
    </button>
    
    <div class="header__brand">
      <a href="/">
        <img
          src="assets/images/logo-sm-dev-academy.png"
          alt="SM Dev Academy"
        >
      </a>
    </div>
  </div>

  <div class="header__center">
    <div class="header__search">
      <input
        type="text"
        placeholder="Buscar cursos, categorias ou tópicos..."
        class="header__search-input"
      >
    </div>
  </div>

  <div class="header__right">
    <button
      type="button"
      class="header__notifications"
    >
      Notificações
    </button>

    <button
      type="button"
      class="header__auth"
    >
      Login
    </button>
  </div>
</header>
