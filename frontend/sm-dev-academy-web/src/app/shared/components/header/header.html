<header class="header">
  <div class="header__left">
    <!-- MOBILE/TABLET HAMBURGUER -->
    <button
      type="button"
      class="header__menu-toggle"
      (click)="toggleMobileMenu()"
    >
      <span class="material-symbols-outlined">density_medium</span>
    </button>

    <div class="header__brand">
      <a href="/">
        <picture>
          <source
            media="(max-width: 400px)"
            srcset="assets/images/icon-sm-dev-academy.png"
          >

          <img
            src="assets/images/logo-sm-dev-academy.png"
            alt="SM Dev Academy"
          >
        </picture>
      </a>
    </div>
  </div>

  <div class="header__center">
    <!-- SEARCH -->
    <div class="header__search">
      <button
        type="button"
        class="header__search-button"
      >
        <span class="material-symbols-outlined">
          search
        </span>
      </button>

      <input
        type="text"
        placeholder="Pesquisar"
        class="header__search-input"
      >
    </div>
  </div>

  <div class="header__right">
    <!-- NOTIFICATIONS -->
    <button
      type="button"
      class="header__icon-button"
    >
      <span class="material-symbols-outlined">
        notifications
      </span>
    </button>

    <!-- LOGIN -->
    <button
      type="button"
      class="header__icon-button"
    >
      <span class="material-symbols-outlined">
        person
      </span>
    </button>
  </div>
</header>

<!-- MOBILE/TABLET MENU -->
<div class="mobile-menu-overlay" [class.mobile-menu-overlay--open]="isMobileMenuOpen">
  <div class="mobile-menu">
    <div class="mobile-menu__header">
      <div class="mobile-menu__logo">
        <a href="/">
          <img
            src="assets/images/logo-sm-dev-academy.png"
            alt="SM Dev Academy"
          >
        </a>        
      </div>

      <button
        type="button"
        class="mobile-menu__close"
        (click)="toggleMobileMenu()"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- NAVIGATION -->
    <nav class="mobile-menu__navigation">
      <ul>
        @for (item of navigationItems; track item.label) {
          <li>
            <a [href]="item.route">
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- CATEGORIES -->
    <section class="mobile-menu__categories">
      <p>Categorias</p>

      <ul>
        @for (item of categoryItems; track item.label) {
          <li>
            <a [href]="item.route">
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </section>

    <!-- FOOTER -->
    <app-footer />
  </div>
</div>
